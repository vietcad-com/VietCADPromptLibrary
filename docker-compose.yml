services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: promptlib
      POSTGRES_PASSWORD: promptlib123
      POSTGRES_DB: promptlib
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5555:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptlib -d promptlib"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://promptlib:promptlib123@db:5432/promptlib?schema=public"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
